server {
    listen 80;
    server_name _;

    # Gravity CMS generátor HTML
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # n8n healthcheck proxy (státuszellenőrzéshez)
    location /healthz {
        proxy_pass http://n8n:5678/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # n8n webhook proxy
    location /webhook/ {
        proxy_pass http://n8n:5678/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Kimeneti fájlok böngészése
    location /output/ {
        alias /output/;
        autoindex on;
    }
}