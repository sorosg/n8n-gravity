server {
    listen 80;
    server_name _;

    # Gravity CMS generátor HTML
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # JavaScript és CSS fájlok cache-elésének letiltása
    location ~* \.(js|css)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # n8n healthcheck proxy (státuszellenőrzéshez)
    location /healthz {
        proxy_pass http://n8n:5678/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # n8n webhook proxy
    location /webhook/ {
        proxy_pass http://n8n:5678/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Gravity CMS teszt környezet proxy
    location /gravity/ {
        rewrite ^/gravity(/.*)$ $1 break;
        proxy_pass http://gravity:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Kimeneti fájlok böngészése
    location /output/ {
        alias /output/;
        autoindex on;
    }
}