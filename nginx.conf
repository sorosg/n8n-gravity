server {
    listen 80;
    server_name _;

    # Gravity CMS generátor HTML
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # JavaScript és CSS fájlok cache-elésének letiltása
    location ~* \.(js|css)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # n8n healthcheck proxy (státuszellenőrzéshez)
    location /healthz {
        proxy_pass http://n8n:5678/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # n8n webhook proxy
    location /webhook/ {
        proxy_pass http://n8n:5678/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Gravity CMS teszt környezet proxy
    location /gravity/ {
        rewrite ^/gravity(/.*)$ $1 break;
        proxy_pass http://gravity:80;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Prefix /gravity;
        # Átirányítások javítása: a válasz Location header-jeiben a localhost:80 → $host:$server_port/gravity/
        proxy_redirect http://localhost:80/ $scheme://$host:$server_port/gravity/;
        proxy_redirect http://localhost:80 $scheme://$host:$server_port/gravity;
        proxy_redirect http://gravity:80/ $scheme://$host:$server_port/gravity/;
        proxy_redirect http://gravity:80 $scheme://$host:$server_port/gravity;
    }

    # DeepSeek API proxy (CORS kikerülése az űrlap AI elemzéséhez)
    location /deepseek/ {
        rewrite ^/deepseek/(.*)$ /$1 break;
        proxy_pass https://api.deepseek.com;
        proxy_http_version 1.1;
        proxy_set_header Host api.deepseek.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Az Authorization header-t a kliens küldi, továbbítjuk
        proxy_pass_request_headers on;
    }

    # Kimeneti fájlok böngészése
    location /output/ {
        alias /output/;
        autoindex on;
    }
}