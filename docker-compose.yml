version: "3.9"

# ============================================================
# n8n + Gravity CMS Automatizáció Docker Stack
# AI-vezérelt weboldal generálás DeepSeek API-val
# ============================================================

services:
  # ----- n8n: Munkafolyamat-automatizáló motor -----
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-gravity
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=${N8N_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_AUTH_PASSWORD:-admin}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_DISABLED=${N8N_USER_MANAGEMENT_DISABLED:-false}
      - N8N_DIAGNOSTICS_ENABLED=false
      # Adatbázis kapcsolat PostgreSQL-hez (ajánlott éles környezetben)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${DB_HOST:-postgres}
      - DB_POSTGRESDB_PORT=${DB_PORT:-5432}
      - DB_POSTGRESDB_DATABASE=${DB_NAME:-n8n}
      - DB_POSTGRESDB_USER=${DB_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-n8n_password}
      - DB_POSTGRESDB_SCHEMA=${DB_SCHEMA:-public}
      # Webhook URL (külső eléréshez szükséges)
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:${N8N_PORT:-5678}}
      # Fájlok tárolása
      - N8N_USER_FOLDER=/home/node/.n8n
      # AI integráció - API kulcsok környezeti változóként
      - N8N_AI_DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - N8N_AI_OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Időzóna
      - GENERIC_TIMEZONE=Europe/Budapest
      - TZ=Europe/Budapest
      # Külső modulok engedélyezése (egyedi node-ok)
      - N8N_EXTERNAL_EXTENSIONS_ENABLED=${N8N_EXTERNAL_EXTENSIONS:-false}
      # Végrehajtási beállítások
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=${EXECUTIONS_MAX_AGE:-168}  # 7 nap alapértelmezetten
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=${EXECUTIONS_PRUNE_MAX:-50000}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/.n8n/workflows
      - ./scripts:/home/node/scripts
      # Ha egyedi n8n node-okat szeretnél használni:
      # - ./custom-nodes:/home/node/.n8n/custom
    networks:
      - n8n_network
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----- PostgreSQL: n8n adatbázis -----
  postgres:
    image: postgres:16-alpine
    container_name: n8n-gravity-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-n8n}
      - POSTGRES_USER=${DB_USER:-n8n}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-n8n_password}
      - TZ=Europe/Budapest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - n8n_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-n8n} -d ${DB_NAME:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----- (Opcionális) Qdrant: Vektor adatbázis RAG-hoz -----
  qdrant:
    image: qdrant/qdrant:latest
    container_name: n8n-gravity-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - n8n_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - full
      - ai

  # ----- (Opcionális) Ollama: Lokális AI modellek futtatása -----
  ollama:
    image: ollama/ollama:latest
    container_name: n8n-gravity-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - n8n_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - full
      - ai
      - gpu

  # ----- (Opcionális) Portainer CE: Docker menedzsment -----
  portainer:
    image: portainer/portainer-ce:latest
    container_name: n8n-gravity-portainer
    restart: unless-stopped
    ports:
      - "${PORTAINER_PORT:-9443}:9443"
      - "${PORTAINER_AGENT_PORT:-9000}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - full
      - management

volumes:
  n8n_data:
    name: n8n_gravity_data
  postgres_data:
    name: n8n_gravity_postgres
  qdrant_data:
    name: n8n_gravity_qdrant
  ollama_data:
    name: n8n_gravity_ollama
  portainer_data:
    name: n8n_gravity_portainer

networks:
  n8n_network:
    name: n8n_gravity_network
    driver: bridge